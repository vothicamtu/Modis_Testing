# Android Specific Configuration for Modis App

# ==================== ANDROID DEVICE CONFIGURATION ====================
platform.name=Android
android.deviceName=66b7547b
android.platformVersion=11.0
android.automationName=UiAutomator2
android.udid=

# ==================== ANDROID APP CONFIGURATION ====================
android.appPackage=com.modis
android.appActivity=com.modis.MainActivity
android.appPath=
android.appWaitActivity=
android.appWaitPackage=

# ==================== ANDROID CAPABILITIES ====================
android.noReset=false
android.fullReset=false
android.autoGrantPermissions=true
android.autoAcceptAlerts=true
android.autoDismissAlerts=true
android.skipUnlock=true
android.unlockType=pin
android.unlockKey=1234

# ==================== ANDROID PERFORMANCE ====================
android.networkSpeed=full
android.gpsEnabled=true
android.enablePerformanceLogging=false
android.newCommandTimeout=300
android.androidInstallTimeout=90000

# ==================== UIAUTOMATOR2 CONFIGURATION ====================
android.uiautomator2ServerLaunchTimeout=60000
android.uiautomator2ServerInstallTimeout=30000
android.uiautomator2ServerReadTimeout=240000
android.skipServerInstallation=false

# ==================== ANDROID SYSTEM CONFIGURATION ====================
android.systemPort=8200
android.chromeDriverPort=9515
android.adbPort=5037
android.bootstrapPort=4724

# ==================== ANDROID PERMISSIONS ====================
android.permissions.camera=android.permission.CAMERA
android.permissions.storage=android.permission.WRITE_EXTERNAL_STORAGE
android.permissions.location=android.permission.ACCESS_FINE_LOCATION
android.permissions.microphone=android.permission.RECORD_AUDIO
android.permissions.contacts=android.permission.READ_CONTACTS

# ==================== ANDROID KEYBOARD ====================
android.unicodeKeyboard=true
android.resetKeyboard=true
android.dontStopAppOnReset=false

# ==================== ANDROID LOGGING ====================
android.logcatFormat=time
android.logcatFilterSpecs=*:V
android.suppressKillServer=false

# ==================== ANDROID EMULATOR CONFIGURATION ====================
android.emulator.avdName=Pixel_4_API_30
android.emulator.avdLaunchTimeout=120000
android.emulator.avdReadyTimeout=120000
android.emulator.isHeadless=false

# ==================== ANDROID REAL DEVICE CONFIGURATION ====================
android.realDevice.udid=
android.realDevice.systemPort=8201
android.realDevice.skipDeviceInitialization=false

# ==================== ANDROID APP MANAGEMENT ====================
android.autoLaunch=true
android.forceAppLaunch=false
android.shouldTerminateApp=false
# ==================== ANDROID GESTURES ====================
android.touchAction.enabled=true
android.w3cActions.enabled=true
android.nativeWebTap=false

# ==================== ANDROID CHROME CONFIGURATION ====================
android.chromeOptions=--disable-web-security,--allow-running-insecure-content
android.chromedriverExecutable=
android.chromedriverExecutableDir=

# ==================== ANDROID ESPRESSO CONFIGURATION ====================
android.espressoServerLaunchTimeout=45000
android.forceEspressoRebuild=false
android.espressoBuildConfig=

# ==================== ANDROID DEBUGGING ====================
android.enableWebviewDetailsCollection=false
android.nativeWebScreenshot=false
android.recreateChromeDriverSessions=false

# ==================== ANDROID SPECIFIC TIMEOUTS ====================
android.deviceReadyTimeout=5
android.androidDeviceReadyTimeout=5
android.adbExecTimeout=20000

# ==================== ANDROID LOCALE AND LANGUAGE ====================
android.locale=en_US
android.language=en
android.localeScript=

# ==================== ANDROID ORIENTATION ====================
android.orientation=PORTRAIT
android.autoRotate=false

# ==================== ANDROID NETWORK ====================
android.isHeadless=false

# ==================== ANDROID SECURITY ====================
android.ignoreUnimportantViews=false
android.disableAndroidWatchers=false
android.enableNotificationListener=false

# ==================== ANDROID SCREENSHOT ====================
android.screenshotQuality=1
android.fixImageFindScreenshotDims=true
android.screenshotWaitTimeout=10

# ==================== ANDROID ELEMENT FINDING ====================
android.waitForIdleTimeout=10
android.waitForSelectorTimeout=0
android.actionAcknowledgmentTimeout=3000
android.keyInjectionDelay=0
android.scrollAcknowledgmentTimeout=200

# ==================== ANDROID MJPEG SERVER ====================
android.mjpegServerPort=7810
android.mjpegScreenshotUrl=

# ==================== ANDROID SETTINGS APP ====================
android.settingsAppPackage=com.android.settings
android.settingsAppActivity=.Settings

# ==================== ANDROID SYSTEM APPS ====================
android.cameraAppPackage=com.android.camera2
android.galleryAppPackage=com.google.android.apps.photos
android.browserAppPackage=com.android.chrome
android.dialerAppPackage=com.google.android.dialer