ios.deviceName=iPhone Simulator
ios.platformVersion=15.0
ios.automationName=XCUITest
ios.udid=

ios.bundleId=com.modis.app
ios.appPath=
ios.appName=Modis

ios.noReset=false
ios.fullReset=false
ios.autoAcceptAlerts=true
ios.autoDismissAlerts=true
ios.shouldUseSingletonTestManager=true

ios.newCommandTimeout=300
ios.launchTimeout=60000
ios.wdaLaunchTimeout=60000
ios.wdaConnectionTimeout=60000

# XCUITEST CONFIGURATION
ios.wdaLocalPort=8100
ios.wdaRemotePort=8101
ios.wdaStartupRetries=2
ios.wdaStartupRetryInterval=10000
ios.iosInstallPause=0
ios.xcodeOrgId=
ios.xcodeSigningId=iPhone Developer
ios.updatedWDABundleId=
ios.derivedDataPath=
ios.useNewWDA=false
ios.wdaEventloopIdleDelay=0

# iOS SIMULATOR CONFIGURATION
ios.simulator.udid=
ios.simulator.startupTimeout=120000
ios.simulator.tracePointer=false
ios.simulator.isHeadless=false

# iOS REAL DEVICE CONFIGURATION
ios.realDevice.udid=
ios.realDevice.teamId=
ios.realDevice.signingId=iPhone Developer
ios.realDevice.provisioningProfile=
ios.realDevice.bootstrapPath=

# iOS APP MANAGEMENT
ios.autoLaunch=true
ios.shouldTerminateApp=false
ios.processArguments=
ios.environmentVariables=

# iOS GESTURES
ios.nativeWebTap=false
ios.tapWithShortPressDuration=0.125
ios.scaleFactor=

# iOS SAFARI CONFIGURATION
ios.safariInitialUrl=
ios.safariAllowPopups=true
ios.safariIgnoreFraudWarning=true
ios.safariOpenLinksInBackground=false
ios.keepKeyChains=false
ios.localizableStringsDir=

# iOS KEYBOARD
ios.sendKeyStrategy=grouped
ios.keyboardAutocorrection=false
ios.keyboardPrediction=false

# iOS PERMISSIONS
ios.permissions.camera=camera
ios.permissions.photos=photos
ios.permissions.location=location
ios.permissions.microphone=microphone
ios.permissions.contacts=contacts
ios.permissions.notifications=notifications

# iOS DEBUGGING
ios.showIOSLog=false
ios.captureLogcat=false
ios.webkitDebugProxyPort=27753
ios.enableAsyncExecuteFromHttps=false

# iOS SPECIFIC TIMEOUTS
ios.deviceReadyTimeout=5
# iOS LOCALE AND LANGUAGE
ios.locale=en_US
ios.language=en
ios.calendarFormat=gregorian

# iOS ORIENTATION
ios.orientation=PORTRAIT
ios.autoRotate=false

# iOS SCREENSHOT
ios.screenshotQuality=1
ios.screenshotWaitTimeout=10
ios.reduceMotion=false

# iOS ELEMENT FINDING
ios.waitForIdleTimeout=10
ios.animationCoolOffTimeout=2000
ios.includeNonModalElements=false
ios.elementResponseAttributes=type,label
ios.shouldUseTestManagerForVisibilityDetection=false

# iOS WEBVIEW
ios.webviewConnectRetries=8
ios.webviewConnectTimeout=0
ios.safariWebInspectorMaxFrameLength=20971520
ios.pageLoadStrategy=normal

# iOS SYSTEM APPS
ios.settingsBundle=com.apple.Preferences
ios.cameraBundle=com.apple.camera
ios.photosBundle=com.apple.mobileslideshow
ios.safariBundle=com.apple.mobilesafari
ios.phoneBundle=com.apple.mobilephone

# iOS SECURITY
ios.allowTouchIdEnroll=false
ios.skipLogCapture=false
ios.useJSONSource=false

# iOS MJPEG SERVER
ios.mjpegServerPort=9100
ios.mjpegServerFramerate=10
ios.mjpegServerScreenshotQuality=25
ios.mjpegServerBitrate=6000000

# iOS CUSTOM COMMANDS
ios.customSSLCert=
ios.webkitResponseTimeout=5000
ios.remoteDebugProxy=
ios.enablePerformanceLogging=false

# iOS SIMULATOR SPECIFIC
ios.simulator.pasteboardAutomaticSync=off
ios.simulator.asyncScreenshot=false
ios.simulator.forceSimulatorSoftwareKeyboardPresence=false

# iOS REAL DEVICE SPECIFIC
ios.realDevice.skipLogCapture=false
ios.realDevice.clearSystemFiles=false
ios.realDevice.enforceAppInstall=false