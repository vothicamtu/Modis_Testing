# Modis Automation Test Configuration

# ==================== PLATFORM CONFIGURATION ====================
platform=android
deviceName=66b7547b
platformVersion=11.0
automationName=UiAutomator2
android.udid=66b7547b

# ==================== APPIUM SERVER CONFIGURATION ====================
appium.serverUrl=http://127.0.0.1:4723
# Appium 2/3 MUST use the root ("/") endpoint. Do NOT set serverPath.
# (Legacy Appium 1.x used "/wd/hub", which will cause 404 on Appium 2/3.)
appium.serverPath=

# ==================== APP CONFIGURATION ====================
android.appPackage=com.modis
android.appActivity=com.modis.MainActivity
android.appPath=C:\\DATLTN\\Modis_FE_TL_ANDROID\\android\\app\\build\\outputs\\apk\\release\\app-release.apk
ios.bundleId=com.modis.app
ios.appPath=

# ==================== DEVICE CAPABILITIES ====================
# See android.properties notes: default to noReset=true on Android 11+ real devices to avoid `pm clear` failures.
android.noReset=true
android.fastReset=false
android.fullReset=false
android.autoGrantPermissions=true
android.autoAcceptAlerts=true
android.autoDismissAlerts=true
android.networkSpeed=full
android.gpsEnabled=true

ios.noReset=false
ios.fullReset=false
ios.autoAcceptAlerts=true
ios.autoDismissAlerts=true

# ==================== TIMEOUT CONFIGURATION ====================
implicit.wait=10
explicit.wait=20
short.wait=5
long.wait=60
element.wait.timeout=15
page.load.timeout=30
network.wait=3
animation.wait=2

# ==================== TEST CONFIGURATION ====================
test.environment=dev
test.resetAppBeforeTest=false
test.useAppRestart=false
test.useFullAppReset=false
test.navigateToHomeAfterTest=false
test.retryCount=2
test.timeout=300

# ==================== SCREENSHOT CONFIGURATION ====================
screenshot.onFailure=true
screenshot.onPass=false
screenshot.directory=screenshots
screenshot.format=png

# ==================== LOGGING CONFIGURATION ====================
log.level=INFO
log.directory=logs
log.pageSourceOnFailure=false
log.performanceMetrics=true

# ==================== REPORTING CONFIGURATION ====================
report.directory=reports
report.extent.name=ModisAutomationReport.html
report.allure.results=allure-results

# ==================== TEST DATA CONFIGURATION ====================
testdata.directory=src/test/resources/testdata
testdata.users.file=users.json
testdata.messages.file=messages.json

# ==================== PERFORMANCE CONFIGURATION ====================
performance.maxAppLaunchTime=10000
performance.maxScreenLoadTime=5000
performance.maxApiResponseTime=3000
performance.maxImageLoadTime=8000

# ==================== NETWORK CONFIGURATION ====================
network.timeout=30
network.retryCount=3
network.retryDelay=1000

# ==================== PARALLEL EXECUTION ====================
parallel.enabled=false
parallel.threadCount=1
parallel.dataProvider.threadCount=1

# ==================== CI/CD CONFIGURATION ====================
ci.headless=false
ci.videoRecording=false
ci.logLevel=WARN
ci.screenshotOnlyOnFailure=true

# ==================== ENVIRONMENT SPECIFIC URLS ====================
env.dev.baseUrl=https://dev-api.modis.com
env.staging.baseUrl=https://staging-api.modis.com
env.prod.baseUrl=https://api.modis.com

# ==================== TEST USER CREDENTIALS ====================
# Note: In real projects, these should be externalized or encrypted
test.user.username=testuser
test.user.password=testpass123
test.user.email=testuser@example.com
test.user.phone=1234567890
test.user.fullname=Test User

test.admin.username=testadmin
test.admin.password=adminpass123

# ==================== FEATURE FLAGS ====================
feature.camera.enabled=true
feature.messaging.enabled=true
feature.friends.enabled=true
feature.notifications.enabled=true
feature.darkMode.enabled=true

# ==================== VALIDATION CONFIGURATION ====================
validation.username.minLength=3
validation.username.maxLength=20
validation.password.minLength=6
validation.password.maxLength=50
validation.email.pattern=^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$
validation.phone.pattern=^[0-9]{10,15}$

# ==================== GESTURE CONFIGURATION ====================
gesture.swipe.duration=1000
gesture.tap.duration=100
gesture.longPress.duration=2000
gesture.swipe.startPercentage=0.8
gesture.swipe.endPercentage=0.2

# ==================== RETRY CONFIGURATION ====================
retry.maxAttempts=3
retry.delay=1000
retry.exponentialBackoff=true
retry.maxDelay=5000

# ==================== CLEANUP CONFIGURATION ====================
cleanup.screenshots.daysOld=7
cleanup.logs.daysOld=30
cleanup.reports.daysOld=14

# ==================== DEBUG CONFIGURATION ====================
debug.enabled=false
debug.elementHighlight=false
debug.slowMotion=false
debug.stepDelay=0
debug.verboseLogging=false
