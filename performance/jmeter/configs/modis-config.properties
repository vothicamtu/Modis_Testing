# Modis Performance Testing Configuration

# Server Configuration
modis.base.url=https://modis-backend.onrender.com
modis.websocket.url=wss://modis-backend.onrender.com/ws

# Test Configuration
default.timeout=90000
default.connect.timeout=30000
default.response.timeout=90000

# Load Test Parameters
load.test.users=50
load.test.ramp.up=300
load.test.duration=600

# Stress Test Parameters  
stress.test.users=200
stress.test.ramp.up=180
stress.test.duration=900

# Spike Test Parameters
spike.test.users=500
spike.test.ramp.up=60
spike.test.duration=300

# Endurance Test Parameters
endurance.test.users=30
endurance.test.ramp.up=600
endurance.test.duration=7200

# Mobile Simulation
mobile.network.delay.min=100
mobile.network.delay.max=500
mobile.bandwidth.limit=1000

# Authentication
auth.token.header=Authorization
auth.token.prefix=Bearer

# Content Types
content.type.json=application/json
content.type.multipart=multipart/form-data

# Pagination
default.page.size=20
max.page.size=50

# Image Upload
max.image.size=10485760
allowed.image.types=image/jpeg,image/png,image/heic

# WebSocket
websocket.connect.timeout=30000
websocket.message.timeout=5000
websocket.reconnect.delay=5000

# Rate Limiting
api.rate.limit.delay=100
upload.rate.limit.delay=1000

# Monitoring
response.time.threshold.auth=2000
response.time.threshold.feed=3000
response.time.threshold.upload=10000
response.time.threshold.message=500
response.time.threshold.api=1000

# Error Thresholds
error.rate.threshold=1.0
timeout.rate.threshold=0.5
success.rate.threshold=99.0